{% extends "base.html" %}
{% block title %}Charts{% endblock %}
{% block content %}
<h1 class="page-title">The Chart Room</h1>

<div class="letter">
  <p class="salutation">Every name Archie has held an opinion on, with his own dealings marked
  <span class="gain">B</span>/<span class="loss">S</span> at their fill prices.</p>
</div>

<section class="ledger">
  <div class="section-label">Price History
    <span class="note">
      <select id="symbol-pick"></select>
      <select id="days-pick">
        <option value="90">3 months</option>
        <option value="180" selected>6 months</option>
        <option value="365">1 year</option>
        <option value="730">2 years</option>
      </select>
    </span>
  </div>
  <div class="chart tall" id="candle-chart"></div>
  <p class="muted small" id="chart-note"></p>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/vendor/echarts.min.js"></script>
<script src="/static/js/charts.js"></script>
<script src="/static/js/chart_page.js"></script>
{% endblock %}
